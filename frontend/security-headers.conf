# Security headers — included in every `location` block. nginx does NOT inherit
# server-level `add_header` into a location that defines its own `add_header`,
# so these must be re-included wherever a location sets any header.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# Enabled automatically when served over TLS; harmless over plain http.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
