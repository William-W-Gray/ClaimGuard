# ClaimGuard web — serves the built SPA and reverse-proxies the API + WebSocket.

# WebSocket upgrade mapping (must live in http context; conf.d is included there).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't advertise the server version.
    server_tokens off;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API + WebSocket → backend service. Re-resolve via Docker's embedded DNS
    # (127.0.0.11) so the proxy survives backend container restarts (no stale IP).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $cg_api http://api:8000;
        proxy_pass $cg_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        include /etc/nginx/security-headers.conf;
        # PHI responses must never be cached by the browser or intermediaries.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Long-cache hashed static assets (safe: content-hashed filenames).
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA client-side routing fallback. index.html itself must not be cached so
    # clients always pick up the latest asset manifest.
    location / {
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
