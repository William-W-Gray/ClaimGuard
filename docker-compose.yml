# ─── ClaimGuard 360° — full stack ──────────────────────────────────────────────
# One command:  docker compose up --build
# Then open:     http://localhost:8080   (web UI, proxies /api + /ws to the backend)
# API docs:      http://localhost:8000/docs
#
# Database: uses managed Postgres via DATABASE_URL in .env (e.g. Neon). If that is
# blank, it falls back to a local Postgres container — start it with:
#   docker compose --profile local-db up --build
#
# Demo login:    admin@claimguard.co.zw / ChangeMe!2026  (pre-filled on the login page)

name: claimguard

x-backend-env: &backend-env
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_JSON: "true"
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://claimguard:claimguard@db:5432/claimguard}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-compose-secret-not-for-real-prod}
  CORS_ORIGINS: http://localhost:8080
  # Refresh-token cookie. Secure=false lets the http://localhost demo work; set
  # COOKIE_SECURE=true (and serve over HTTPS) for any real deployment. SameSite
  # strict is safe because the SPA and API are same-origin behind nginx.
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  COOKIE_SAMESITE: ${COOKIE_SAMESITE:-strict}
  # Demo mode relaxes prod guards (allows http cookies + the demo admin password)
  # and mounts the /demo scenario router. Set DEMO_MODE=false for a real deploy —
  # the config validator then requires COOKIE_SECURE=true and a real admin pw.
  DEMO_MODE: ${DEMO_MODE:-true}
  FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-ChangeMe!2026}

services:
  # Local Postgres — only started with the `local-db` profile (managed DB is default).
  db:
    image: postgres:16-alpine
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: claimguard
      POSTGRES_PASSWORD: claimguard
      POSTGRES_DB: claimguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    environment:
      <<: *backend-env
      # Seeds demo data (incl. the demo admin) on boot. Turn off for real prod.
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["./scripts/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    environment: *backend-env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=info"]
    healthcheck:
      disable: true

  beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    environment: *backend-env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "beat", "--loglevel=info"]
    healthcheck:
      disable: true

  web:
    build:
      context: ./frontend
      args:
        # Pre-fills demo credentials on the login screen. Empty for a real deploy.
        VITE_DEMO_MODE: ${DEMO_MODE:-true}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
